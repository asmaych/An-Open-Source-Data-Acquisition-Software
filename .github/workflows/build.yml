name: Build & Release

on:
  push:
    tags: ["v*"]          # trigger on version tags, e.g. v1.0.0
  workflow_dispatch:       # allow manual runs

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux
            artifact: daq_capstone

          - os: macos-latest
            name: macos-arm
            artifact: daq_capstone

          - os: windows-latest
            name: windows
            artifact: daq_capstone.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libgl1-mesa-dev \
            pkg-config

      - name: Install macOS dependencies
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install pkg-config

      - name: Configure (Linux)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          cmake -S Main_Project -B build \
            -DCMAKE_BUILD_TYPE=Release

      - name: Configure (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          cmake -S Main_Project -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.3
      - name: Clear build cache (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          if (Test-Path build) { Remove-Item -Recurse -Force build }
      - name: Configure (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cmake -S Main_Project -B build `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-binary
          path: |
            build/${{ matrix.artifact }}
            build/Release/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linux-binary/daq_capstone
            macos-arm-binary/daq_capstone
            windows-binary/daq_capstone.exe
